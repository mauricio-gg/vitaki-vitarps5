# Lint & Format workflow
#
# Runs on every PR (any branch) and every push to main.
# Scope: vita/src/ and vita/include/ only.  lib/ and third-party/ are upstream Chiaki — excluded.
#
# Tool versions:
#   clang-format: installed via pip (PyPI package "clang-format" by ssciwr) at the exact
#                 version pinned in both this file and the repo Dockerfile.  The PyPI wheel
#                 ships an official LLVM binary, so the same version number produces
#                 byte-identical output on musl/Alpine (Docker) and glibc/Ubuntu (CI runner).
#                 Pin: 19.1.5  — update in BOTH places together when upgrading.
#   cppcheck:     installed via apt in the lint job below.
#
# Both jobs run in parallel so each posts its own status check to the PR.

name: Lint & Format

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: clang-format dry-run
  # Installs clang-format==19.1.5 from PyPI (same version baked into the repo
  # Dockerfile), then runs a --dry-run --Werror pass over vita/src/ and
  # vita/include/.  Any file that would be reformatted causes a non-zero exit.
  # This job completes in well under 30 seconds — no Docker build required.
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned clang-format
        # Version must match the pin in Dockerfile (clang-format==19.1.5).
        # The PyPI wheel ships an official LLVM binary, guaranteeing identical
        # formatter output to the local Docker environment.
        run: pip install clang-format==19.1.5

      - name: Verify clang-format version
        run: clang-format --version

      - name: Check formatting (dry-run)
        # --dry-run --Werror: exit non-zero if any file differs from formatted output.
        # No files are modified; a failure means the PR needs a reformat commit.
        run: |
          find vita/src vita/include -type f \
            \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror -style=file

  # ---------------------------------------------------------------------------
  # Job 2: cppcheck static analysis
  # Uses --enable=warning,performance,portability (not --enable=all) to avoid
  # noisy style/information categories (unreadVariable, unusedStructMember,
  # checkersReport) that produce false positives when Vita SDK headers are
  # absent.  Real bug classes (null-pointer, memory leaks, undefined behaviour)
  # are all covered by the warning and portability checkers.
  # Suppression list at .cppcheck-suppressions handles the remaining categories
  # that are noise in a cross-compiled Vita project (missingInclude, etc.).
  # ---------------------------------------------------------------------------
  lint:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Verify cppcheck version
        run: cppcheck --version

      - name: Run cppcheck
        # --enable=warning,performance,portability  - real bug classes only; no style noise
        # --std=c99               - match VitaSDK's C standard
        # --language=c            - treat all files as C (avoids .h ambiguity)
        # --inline-suppr          - honour // cppcheck-suppress comments in source
        # --suppressions-list=... - project-level suppressions file
        # --error-exitcode=1      - fail CI on any finding (strict gatekeeping)
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --std=c99 \
            --language=c \
            --inline-suppr \
            --suppressions-list=.cppcheck-suppressions \
            --error-exitcode=1 \
            -I vita/include \
            -I lib/include \
            '-DLOGD(...)=' \
            '-DLOGE(...)=' \
            vita/src/ \
            vita/include/
