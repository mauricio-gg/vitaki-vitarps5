# Lint & Format workflow
#
# Runs on every PR (any branch) and every push to main.
# Scope: vita/src/ and vita/include/ only.  lib/ and third-party/ are upstream Chiaki — excluded.
#
# Tool versions:
#   clang-format: whatever ubuntu-latest (currently 24.04) provides via `clang-format` package.
#                 As of Ubuntu 24.04 this resolves to clang-format-18.
#   cppcheck:     whatever ubuntu-latest provides via `cppcheck` package (currently 2.13.x).
#
# Both jobs run in parallel so each posts its own status check to the PR.

name: Lint & Format

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: clang-format dry-run
  # Fails if any .c/.h/.cpp/.hpp file under vita/src/ or vita/include/ would
  # be reformatted according to the project's .clang-format at the repo root.
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          # Install the distro-default clang-format; on ubuntu-24.04 this is
          # clang-format-18.  Pin by package name if a specific version is needed.
          sudo apt-get install -y clang-format

      - name: Verify clang-format version
        run: clang-format --version

      - name: Check formatting (dry-run)
        # --dry-run prints proposed edits without writing; --Werror turns any
        # diff into a non-zero exit code so the job fails.
        # -style=file instructs clang-format to pick up .clang-format from the
        # repo root (already present in the working tree after checkout).
        run: |
          find vita/src vita/include \
            -type f \
            \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' \) \
            -print0 \
          | xargs -0 clang-format --dry-run --Werror -style=file

  # ---------------------------------------------------------------------------
  # Job 2: cppcheck static analysis
  # Strict mode: --error-exitcode=1 means ANY finding fails the job.
  # Suppression list lives at .cppcheck-suppressions in the repo root and
  # currently suppresses: missingIncludeSystem, unusedFunction,
  # unmatchedSuppression, variableScope.
  # ---------------------------------------------------------------------------
  lint:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Verify cppcheck version
        run: cppcheck --version

      - name: Run cppcheck
        # --enable=all            - enable all checks (style, performance, portability, ...)
        # --std=c99               - match VitaSDK's C standard
        # --language=c            - treat all files as C (avoids .h ambiguity)
        # --inline-suppr          - honour // cppcheck-suppress comments in source
        # --suppressions-list=... - project-level suppressions file
        # --error-exitcode=1      - fail CI on any finding (strict gatekeeping)
        run: |
          cppcheck \
            --enable=all \
            --std=c99 \
            --language=c \
            --inline-suppr \
            --suppressions-list=.cppcheck-suppressions \
            --error-exitcode=1 \
            vita/src/ \
            vita/include/
