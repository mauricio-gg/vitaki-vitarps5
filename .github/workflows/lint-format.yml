# Lint & Format workflow
#
# Runs on every PR (any branch) and every push to main.
# Scope: vita/src/ and vita/include/ only.  lib/ and third-party/ are upstream Chiaki — excluded.
#
# Tool versions:
#   clang-format: provided by the project Docker image (vitaki-fork-dev:latest built from
#                 the repo Dockerfile).  The image uses Alpine's clang-extra-tools package,
#                 which matches the version used by `./tools/build.sh format` locally.
#                 Running inside the image guarantees CI and local output are identical.
#   cppcheck:     provided by the project Docker image (same image).
#
# Both jobs run in parallel so each posts its own status check to the PR.

name: Lint & Format

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: clang-format dry-run
  # Builds the project Docker image (same image used by `./tools/build.sh`),
  # then runs FORMAT_CHECK=1 which passes --dry-run --Werror to clang-format.
  # This guarantees the formatter version and configuration exactly match what
  # the developer sees locally, avoiding false failures from distro version
  # mismatches (e.g. Ubuntu 24.04 ships clang-format-18, Alpine ships a
  # different major version).
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build project Docker image
        # Build the same image that `./tools/build.sh` builds locally.
        # --load makes the image available to subsequent docker run calls.
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag vitaki-fork-dev:latest \
            --load \
            .

      - name: Verify clang-format version (inside image)
        run: docker run --rm --platform linux/amd64 vitaki-fork-dev:latest clang-format --version

      - name: Check formatting (dry-run inside Docker image)
        # FORMAT_CHECK=1 tells format_code() to pass --dry-run --Werror instead
        # of -i, so no files are modified and any diff causes a non-zero exit.
        run: FORMAT_CHECK=1 ./tools/build.sh format

  # ---------------------------------------------------------------------------
  # Job 2: cppcheck static analysis
  # Uses --enable=warning,performance,portability (not --enable=all) to avoid
  # noisy style/information categories (unreadVariable, unusedStructMember,
  # checkersReport) that produce false positives when Vita SDK headers are
  # absent.  Real bug classes (null-pointer, memory leaks, undefined behaviour)
  # are all covered by the warning and portability checkers.
  # Suppression list at .cppcheck-suppressions handles the remaining categories
  # that are noise in a cross-compiled Vita project (missingInclude, etc.).
  # ---------------------------------------------------------------------------
  lint:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Verify cppcheck version
        run: cppcheck --version

      - name: Run cppcheck
        # --enable=warning,performance,portability  - real bug classes only; no style noise
        # --std=c99               - match VitaSDK's C standard
        # --language=c            - treat all files as C (avoids .h ambiguity)
        # --inline-suppr          - honour // cppcheck-suppress comments in source
        # --suppressions-list=... - project-level suppressions file
        # --error-exitcode=1      - fail CI on any finding (strict gatekeeping)
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --std=c99 \
            --language=c \
            --inline-suppr \
            --suppressions-list=.cppcheck-suppressions \
            --error-exitcode=1 \
            vita/src/ \
            vita/include/
